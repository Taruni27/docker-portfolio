name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            echo "Connected to EC2"

            # Move to project folder (change if needed)
            cd ~ || exit

            # If repo already exists, update it
            if [ -d "app" ]; then
              cd app
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git app
              cd app
            fi

            # Build and run Docker
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker build -t myapp .
            sudo docker run -d -p 80:80 --name myapp myapp

          EOF
