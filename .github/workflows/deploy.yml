- name: Deploy to EC2
  run: |
    ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'

      echo "Connected to EC2"

      cd ~ || exit

      if [ -d "app" ]; then
        cd app
        git pull origin main
      else
        git clone https://github.com/${{ github.repository }}.git app
        cd app
      fi

      # Stop old container (IMPORTANT FIX)
      sudo docker stop myapp || true
      sudo docker rm myapp || true

      # Remove old images (optional cleanup)
      sudo docker image prune -f

      # Build and run new container
      sudo docker build -t myapp .
      sudo docker run -d -p 80:80 --name myapp myapp

    EOF
